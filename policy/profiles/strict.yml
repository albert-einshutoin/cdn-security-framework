# Strict profile: maximum security; may require app/API compatibility.
# Copy to policy/base.yml: cp policy/profiles/strict.yml policy/base.yml
# See policy/README.md (en) or policy/README.ja.md (ja) for profile comparison.

version: 1
project: example-cdn-security

metadata:
  risk_level: strict
  description: "Maximum edge hardening; intended for surfaces with tight client control."

defaults:
  mode: "enforce"
  response:
    add_security_headers: true

request:
  allow_methods: ["GET", "HEAD", "POST"]

  limits:
    max_query_length: 512
    max_query_params: 20
    max_uri_length: 1024

  block:
    path_patterns:
      contains:
        - "/../"
        - ".."
        - "%2e%2e"
        - "%2E%2E"
      regex:
        - "(?i)%2f\\.\\./"
        - "(?i)\\.\\.%2f"
        - "(?i)\\\\\\.\\.\\\\"
    ua_contains:
      - "sqlmap"
      - "nikto"
      - "acunetix"
      - "masscan"
      - "python-requests"
      - "zgrab"
      - "nmap"
      - "curl"
      - "wget"
      - "scanner"
    header_missing:
      - "user-agent"

  normalize:
    drop_query_keys:
      - "utm_source"
      - "utm_medium"
      - "utm_campaign"
      - "utm_term"
      - "utm_content"
      - "gclid"
      - "fbclid"

routes:
  - name: admin
    match:
      path_prefixes: ["/admin", "/docs", "/swagger", "/api/admin", "/internal"]
    auth_gate:
      type: "static_token"
      header: "x-edge-token"
      token_env: "EDGE_ADMIN_TOKEN"
    response:
      cache_control: "no-store"
    request:
      allow_methods: ["GET", "HEAD", "POST"]

observability:
  log_format: "json"
  correlation_id_header: "traceparent"
  audit_log_auth: true
  audit_hash_sub: true

response_headers:
  hsts: "max-age=31536000; includeSubDomains; preload"
  x_content_type_options: "nosniff"
  referrer_policy: "no-referrer"
  permissions_policy: "camera=(), microphone=(), geolocation=(), payment=()"
  csp_public: "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self';"
  csp_admin:  "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';"

firewall:
  waf:
    scope: CLOUDFRONT
    managed_rules:
      - "AWSManagedRulesCommonRuleSet"
      - "AWSManagedRulesKnownBadInputsRuleSet"
      - "AWSManagedRulesIPReputationList"
      - "AWSManagedRulesAnonymousIpList"
    rate_limit_rules:
      - name: "global-ip-limit"
        limit: 2000
        aggregate_key_type: "IP"
        priority: 1
        action: "block"
      - name: "login-ip-limit"
        limit: 100
        aggregate_key_type: "IP"
        action: "block"
        priority: 2
        scope_down_statement:
          byte_match_statement:
            field_to_match: { uri_path: {} }
            positional_constraint: "STARTS_WITH"
            search_string: "/login"
            text_transformation: [{ priority: 0, type: "LOWERCASE" }]
    block_response:
      status_code: 403
      body: "blocked"
      content_type: "TEXT_PLAIN"
    logging:
      enabled: false
      destination_arn_env: "WAF_LOG_DESTINATION_ARN"
      redacted_fields:
        - "authorization"
        - "cookie"
        - "x-api-key"

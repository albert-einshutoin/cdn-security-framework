name: Release to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # CI-only build tokens — match the names used by policy-lint.yml so
      # drift and unit tests that consume them reproduce here identically.
      EDGE_ADMIN_TOKEN: ci-build-token-not-for-deploy
      ORIGIN_SECRET: ci-origin-secret-not-for-deploy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Ensure tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: npm audit (block HIGH/CRITICAL vulnerabilities)
        run: npm audit --audit-level=high

      - name: Policy lint (security / base)
        run: |
          if [ -f policy/security.yml ]; then npm run lint:policy -- policy/security.yml; else npm run lint:policy -- policy/base.yml; fi

      - name: Policy lint (profiles)
        run: |
          npm run lint:policy -- policy/profiles/balanced.yml
          npm run lint:policy -- policy/profiles/strict.yml
          npm run lint:policy -- policy/profiles/permissive.yml

      - name: Policy lint (archetypes)
        run: |
          npm run lint:policy -- policy/archetypes/spa-static-site.yml
          npm run lint:policy -- policy/archetypes/rest-api.yml
          npm run lint:policy -- policy/archetypes/admin-panel.yml
          npm run lint:policy -- policy/archetypes/microservice-origin.yml

      - name: Build AWS (compile policy -> dist)
        run: npm run build

      - name: Build Cloudflare (compile policy -> dist)
        run: node scripts/compile-cloudflare.js

      - name: Ensure build produces dist/
        run: |
          test -f dist/edge/viewer-request.js || (echo "Missing dist/edge/viewer-request.js"; exit 1)
          test -f dist/edge/viewer-response.js || (echo "Missing dist/edge/viewer-response.js"; exit 1)
          test -f dist/edge/origin-request.js || (echo "Missing dist/edge/origin-request.js"; exit 1)
          test -f dist/edge/cloudflare/index.ts || (echo "Missing dist/edge/cloudflare/index.ts"; exit 1)

      - name: Runtime tests (AWS + Cloudflare)
        run: npm run test:runtime

      - name: Unit tests (compiler core + doctor + emit-waf)
        run: npm run test:unit

      - name: CLI doctor self-check (uses repo's own policy)
        run: node bin/cli.js doctor --no-report

      - name: ReDoS fuzz (user-supplied regexes must not backtrack catastrophically)
        run: npm run test:fuzz

      - name: Cloudflare Worker integration tests (Node-native fetch harness)
        run: npm run test:cloudflare-integration

      - name: Pseudo Edge container attack tests
        run: npm run test:edge-container

      - name: Drift check (base + profiles vs golden generated artifacts)
        run: npm run test:drift

      - name: Security baseline check (OWASP mapping + CI guardrails)
        run: npm run test:security-baseline

      - name: Coverage (c8, fail below 80% lines)
        run: npm run test:coverage

      - name: Verify npm package contents (dry-run)
        run: npm pack --dry-run

      - name: Check whether npm version already exists
        id: npm_version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} already exists on npm; skipping publish and running verification only."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm (with SLSA v1 provenance attestation)
        if: steps.npm_version.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Always publish with --provenance so consumers can verify the tarball
        # was built by this workflow. npm transparently uses GitHub's OIDC
        # identity for the attestation; the legacy token only authorizes the
        # publish itself. Both modes produce a verifiable attestation on the
        # npm registry.
        run: npm publish --provenance --access public

      # After publish, fetch the tarball we just pushed and verify the
      # registry-side attestation signatures cover it. This catches two
      # classes of failure a plain `--provenance` flag cannot: (a) the
      # attestation was never recorded on the registry, (b) the tarball on
      # the registry drifted from the workflow-built artifact (tampering in
      # transit / registry mirror misconfiguration).
      - name: Verify provenance attestation is recorded and valid
        run: |
          set -e
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          echo "Verifying provenance for ${NAME}@${VERSION}..."
          # Use a scratch dir so the downloaded tarball doesn't collide with
          # the `npm pack --dry-run` artifact from the lint step.
          mkdir -p provenance-verify
          cd provenance-verify
          npm pack "${NAME}@${VERSION}"
          # `npm audit signatures` hits the registry attestation API and
          # fails non-zero when any published version in the working tree's
          # dependency set lacks a valid attestation. We run it inside the
          # scratch dir where the published tarball is the install target.
          npm init -y >/dev/null
          npm install --no-save "${NAME}@${VERSION}"
          npm audit signatures

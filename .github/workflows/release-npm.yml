name: Release to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Ensure tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Policy lint (security / base)
        run: |
          if [ -f policy/security.yml ]; then npm run lint:policy -- policy/security.yml; else npm run lint:policy -- policy/base.yml; fi

      - name: Policy lint (profiles)
        run: |
          npm run lint:policy -- policy/profiles/balanced.yml
          npm run lint:policy -- policy/profiles/strict.yml
          npm run lint:policy -- policy/profiles/permissive.yml

      - name: Build AWS (compile policy -> dist)
        run: npm run build

      - name: Build Cloudflare (compile policy -> dist)
        run: node scripts/compile-cloudflare.js

      - name: Runtime tests (AWS + Cloudflare)
        run: npm run test:runtime

      - name: Unit tests (compiler core)
        run: npm run test:unit

      - name: Drift check (base + profiles vs golden generated artifacts)
        run: npm run test:drift

      - name: Security baseline check (OWASP mapping + CI guardrails)
        run: npm run test:security-baseline

      - name: Verify npm package contents (dry-run)
        run: npm pack --dry-run

      - name: Publish package to npm (with SLSA v1 provenance attestation)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Always publish with --provenance so consumers can verify the tarball
        # was built by this workflow. npm transparently uses GitHub's OIDC
        # identity for the attestation; the legacy token only authorizes the
        # publish itself. Both modes produce a verifiable attestation on the
        # npm registry.
        run: npm publish --provenance --access public

      # After publish, fetch the tarball we just pushed and verify the
      # registry-side attestation signatures cover it. This catches two
      # classes of failure a plain `--provenance` flag cannot: (a) the
      # attestation was never recorded on the registry, (b) the tarball on
      # the registry drifted from the workflow-built artifact (tampering in
      # transit / registry mirror misconfiguration).
      - name: Verify provenance attestation is recorded and valid
        run: |
          set -e
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          echo "Verifying provenance for ${NAME}@${VERSION}..."
          # Use a scratch dir so the downloaded tarball doesn't collide with
          # the `npm pack --dry-run` artifact from the lint step.
          mkdir -p .provenance-verify
          cd .provenance-verify
          npm pack "${NAME}@${VERSION}"
          # `npm audit signatures` hits the registry attestation API and
          # fails non-zero when any published version in the working tree's
          # dependency set lacks a valid attestation. We run it inside the
          # scratch dir where the published tarball is the install target.
          npm init -y >/dev/null
          npm install --no-save "${NAME}@${VERSION}"
          npm audit signatures
